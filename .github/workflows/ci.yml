# -----------------------------------------------------------------
# CI/CD Pipeline – Lint, Test, SonarCloud, Build & Push, Deploy
# -----------------------------------------------------------------
name: CI

on:
  pull_request:
    branches:
      - "**"
  push:
    branches:
      - main
      - "demo/**"

# Cancel redundant runs for the same branch / PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# -----------------------------------------------------------------
# Job 1: Lint & Test
# -----------------------------------------------------------------
jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/offer-decision-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Lint with ruff
        run: ruff check app/ tests/

      - name: Run tests with coverage
        run: |
          pytest --cov=app --cov-report=xml:coverage.xml tests/

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: services/offer-decision-service/coverage.xml

  # -----------------------------------------------------------------
  # Job 2: SonarCloud Scan
  # -----------------------------------------------------------------
  sonar:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for accurate blame / new-code detection

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      - name: Fix coverage source paths
        run: |
          sed -i "s|<source>.*</source>|<source>${GITHUB_WORKSPACE}/services/offer-decision-service</source>|" coverage.xml

      - name: SonarCloud analysis
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # -----------------------------------------------------------------
  # Job 3: Build & Push Docker Image (main only)
  # -----------------------------------------------------------------
  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [lint-test, sonar]
    if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/demo/')) && github.event_name == 'push'
    permissions:
      id-token: write   # Required for OIDC
      contents: read
    env:
      AWS_REGION: us-east-1
      ECR_REPOSITORY: offer-decision-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Docker image
        working-directory: services/offer-decision-service
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --target production \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

      - name: Output image URI
        id: image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: echo "uri=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"
    outputs:
      image_uri: ${{ steps.image.outputs.uri }}

  # -----------------------------------------------------------------
  # Job 4: Deploy to EKS (main only, after build)
  # -----------------------------------------------------------------
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-push
    if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/demo/')) && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: us-east-1
      EKS_CLUSTER: subscription-offer-app
      K8S_NAMESPACE: offer-decision
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name "$EKS_CLUSTER" \
            --region "$AWS_REGION"

      - name: Deploy with Helm
        run: |
          helm upgrade --install offer-decision-service \
            helm/offer-decision-service/ \
            --namespace "$K8S_NAMESPACE" \
            --create-namespace \
            --set image.repository=$(echo "${{ needs.build-push.outputs.image_uri }}" | cut -d: -f1) \
            --set image.tag=$(echo "${{ needs.build-push.outputs.image_uri }}" | cut -d: -f2) \
            --wait \
            --timeout 5m
