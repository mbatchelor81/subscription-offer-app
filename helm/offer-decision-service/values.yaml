# ---------------------------------------------------------------
# Default values for offer-decision-service Helm chart
# ---------------------------------------------------------------

replicaCount: 2

image:
  repository: offer-decision-service
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# -- Service account configuration
serviceAccount:
  create: true
  annotations: {}
  name: ""

# -- Pod-level settings
podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# -- Service
service:
  type: ClusterIP
  port: 80
  targetPort: 8000

# -- Probes
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

# -- Resource requests and limits
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# -- Horizontal Pod Autoscaler (disabled by default)
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 75
  # targetMemoryUtilizationPercentage: 80

# -- Application environment variables (non-sensitive)
config:
  APP_ENV: "production"
  LOG_LEVEL: "info"

# -- Secret references for sensitive values
# These reference an externally managed Kubernetes Secret.
secretRef:
  name: "offer-decision-service-secrets"
  keys:
    OPENAI_API_KEY: "openai-api-key"

# -- Node selector, tolerations, affinity
nodeSelector: {}
tolerations: []
affinity: {}
