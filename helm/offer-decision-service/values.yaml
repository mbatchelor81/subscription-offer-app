# Default values for offer-decision-service

replicaCount: 1

image:
  repository: offer-decision-service
  tag: latest
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

# -- Non-sensitive configuration (mounted via ConfigMap)
config:
  APP_ENV: "production"
  LOG_LEVEL: "info"
  ALLOWED_ORIGINS: ""  # comma-separated list of allowed CORS origins

# -- Sensitive configuration (mounted via Secret)
# Set secret.create=true to have the chart manage the Secret resource,
# or set secret.existingSecret to reference an externally-managed Secret.
# In production, prefer ExternalSecrets / SealedSecrets over inline values.
secret:
  create: false
  existingSecret: ""
  # Values below are only used when secret.create=true.
  # In production, supply these via --set or a sealed-secrets workflow.
  data:
    OPENAI_API_KEY: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# -- Horizontal Pod Autoscaler (disabled by default)
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

# ── Observability ──────────────────────────────────────────────

# OpenTelemetry collector endpoint (leave empty to disable export)
otel:
  exporterEndpoint: ""

# Prometheus scrape annotations are added to the pod template
# automatically. Override the port/path here if needed.
prometheus:
  scrape: true
  port: 8000
  path: /metrics

nodeSelector: {}
tolerations: []
affinity: {}
