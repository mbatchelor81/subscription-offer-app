{{- /*
  Secret: offer-decision-service credentials
  - Values are injected from Helm values.yaml or --set flags.
  - NEVER commit plaintext secrets to this file.
  - In production, prefer ExternalSecrets or SealedSecrets operators
    to pull credentials from AWS Secrets Manager / Vault.
*/ -}}
{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "offer-decision-service.fullname" . }}
  labels:
    {{- include "offer-decision-service.labels" . | nindent 4 }}
type: Opaque
data:
  {{- range $key, $value := .Values.secret.data }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}
{{- end }}
