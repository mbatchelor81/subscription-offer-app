{{/*
  This template serves as documentation for the external Secret
  that must be created before deploying the chart.

  The Deployment references the Secret named in .Values.secretRef.name
  and maps each key listed in .Values.secretRef.keys to an env var.

  Example — create the secret manually or via an external-secrets operator:

    kubectl create secret generic {{ .Values.secretRef.name }} \
      {{- range $envKey, $secretKey := .Values.secretRef.keys }}
      --from-literal={{ $secretKey }}=<VALUE> \
      {{- end }}
      -n <namespace>
*/}}
