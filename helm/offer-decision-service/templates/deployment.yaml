apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-offer-decision-service
  labels:
    app: offer-decision-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: offer-decision-service
  template:
    metadata:
      labels:
        app: offer-decision-service
      annotations:
        {{- if .Values.prometheus.scrape }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.prometheus.port }}"
        prometheus.io/path: "{{ .Values.prometheus.path }}"
        {{- end }}
    spec:
      containers:
        - name: offer-decision-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: LOG_LEVEL
              value: "{{ .Values.env.LOG_LEVEL }}"
            - name: APP_ENV
              value: "{{ .Values.env.APP_ENV }}"
            {{- if .Values.otel.exporterEndpoint }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "{{ .Values.otel.exporterEndpoint }}"
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.service.port }}
            initialDelaySeconds: 3
            periodSeconds: 5
